ktor:
  application:
    modules:
      - com.mk.kmpshowcase.server.ApplicationKt.module
  deployment:
    port: "$PORT:8080"
    host: "0.0.0.0"

jwt:
  secret: "$JWT_SECRET:development-only-secret"
  issuer: "$JWT_ISSUER:kmp-showcase"
  audience: "$JWT_AUDIENCE:kmp-showcase-users"

database:
  useH2: "$USE_H2:true"
  url: "$DATABASE_URL:jdbc:postgresql://localhost:5432/kmpshowcase"
  user: "$DATABASE_USER:postgres"
  password: "$DATABASE_PASSWORD:postgres"

mail:
  host: "$MAIL_HOST:smtp.m1.websupport.sk"
  port: "$MAIL_PORT:465"
  user: "$MAIL_USER:admin@mkdigital.sk"
  password: "$MAIL_PASSWORD:"
  from: "$MAIL_FROM:admin@mkdigital.sk"
  recipient: "$MAIL_RECIPIENT:admin@mkdigital.sk"
